<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bobo Forge — Build-A-Bobo</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root{--cream:#fee1bf;--ink:#261d1b;--red:#b90b2a;--brown:#937a6b;--paper:#fff6ea}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'VT323',monospace;color:var(--ink);background:repeating-linear-gradient(0deg,transparent 0 7px,rgba(38,29,27,.025) 7px 8px),var(--cream);display:flex;flex-direction:column;padding:14px 16px 12px}
header{width:100%;text-align:center;margin-bottom:10px;flex:0 0 auto}
h1{font-family:'Press Start 2P',monospace;font-size:clamp(14px,2.1vw,22px);text-shadow:3px 3px 0 var(--red);line-height:1.4}
.sub{font-size:18px;color:var(--brown);margin-top:4px}
.sub b{color:var(--red)}
main{flex:1 1 auto;min-height:0;width:100%;display:grid;grid-template-columns:minmax(0,420px) minmax(0,1fr);gap:18px;align-items:stretch}
@media(max-width:900px){main{grid-template-columns:1fr;grid-template-rows:auto 1fr}}
.stage{display:flex;flex-direction:column;gap:12px;min-height:0;overflow:hidden}
.card,.block{background:var(--paper);border:4px solid var(--ink);box-shadow:6px 6px 0 var(--ink);padding:12px}
.frame{border:3px dashed var(--brown);padding:6px;background:#fff}
canvas#cv{display:block;width:100%;height:auto;image-rendering:pixelated;background:#e9dccb}
.idbar{margin-top:8px;font-size:16px;color:var(--brown);border-top:2px solid var(--ink);padding-top:6px;line-height:1.35}
.idbar b{color:var(--ink)}
.controls{overflow:auto;flex:1 1 auto;min-height:0}
label,.zlabel{font-family:'Press Start 2P',monospace;font-size:10px;display:block;margin-bottom:6px;letter-spacing:.5px}
input[type=text]{width:100%;font-family:'VT323',monospace;font-size:20px;padding:6px 10px;border:3px solid var(--ink);background:#fff}
input[type=range]{width:100%;accent-color:var(--red)}
button{font-family:'Press Start 2P',monospace;font-size:11px;padding:11px 12px;border:3px solid var(--ink);background:#fff;cursor:pointer;box-shadow:4px 4px 0 var(--ink)}
button:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--ink)}
button.primary{background:var(--red);color:#fff}
button.ghost{background:var(--cream)}
.btnrow{display:flex;gap:10px}.btnrow button{flex:1}
.panel{height:100%;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.panelbody{overflow:auto;flex:1 1 auto;padding-right:6px}
.swatches{display:flex;flex-wrap:wrap;gap:6px}
.sw{width:36px;height:36px;border:3px solid var(--ink);padding:0;box-shadow:none;cursor:pointer;position:relative}
.sw[aria-pressed=true]{outline:3px solid var(--red);outline-offset:1px}
.sw .lbl{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--cream);font-size:12px;padding:2px 6px;white-space:nowrap;display:none;pointer-events:none;z-index:5}
.sw:hover .lbl{display:block}
.zone{border-top:2px solid var(--ink);padding-top:10px;margin-top:12px}
.zonehead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.zcount{font-size:15px;color:var(--brown)}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px}
.thumb{border:3px solid var(--ink);background:#fff;cursor:pointer;padding:0;box-shadow:none;position:relative;display:flex;flex-direction:column}
.thumb canvas{width:100%;image-rendering:pixelated;display:block}
.thumb .nm{display:block;font-size:13px;line-height:1.15;padding:3px;border-top:2px solid var(--ink);background:var(--cream);white-space:normal;text-align:center;min-height:32px}
.thumb[aria-pressed=true]{outline:3px solid var(--red);outline-offset:1px}
.none-th{display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--brown);height:120px}
.check{display:flex;align-items:center;gap:10px;font-size:19px}
.check input{width:20px;height:20px;accent-color:var(--red)}
.status{font-size:17px;color:var(--brown);min-height:20px;margin-top:6px}
footer{font-size:14px;color:var(--brown);text-align:center;margin-top:8px;flex:0 0 auto}
</style>
</head>
<body>
<header>
  <h1>PIXEL BOBO · BUILD-A-BOBO</h1>
  <div class="sub">Pixel Bobo's rescued from the Bear Market — Free PFP Generator. <b>$BOBO</b></div>
</header>
<main>
<section class="stage">
  <div class="card">
    <div class="frame"><canvas id="cv" width="960" height="960"></canvas></div>
    <div class="idbar" id="traitline">bare bobo — pick traits or hit DUMP IT</div>
    <div class="btnrow" style="margin-top:10px">
      <button class="primary" id="mint">🎲 DUMP IT</button>
      <button class="ghost" id="clear">CLEAR ALL</button>
    </div>
  </div>
  <div class="block controls">
    <label for="top">TOP TEXT</label><input type="text" id="top" maxlength="80" autocomplete="off">
    <label for="bot" style="margin-top:8px">BOTTOM TEXT</label><input type="text" id="bot" maxlength="80" autocomplete="off">
    <label for="size" style="margin-top:8px">TEXT SIZE</label><input type="range" id="size" min="48" max="140" value="92">
    <div class="check" style="margin-top:8px"><input type="checkbox" id="wm" checked><label for="wm" style="margin:0;font-family:'VT323',monospace;font-size:19px">stamp $BOBO watermark</label></div>
    <div class="btnrow" style="margin-top:10px"><button class="primary" id="dl">⬇ SAVE PNG</button><button class="ghost" id="copy">COPY</button></div>
    <div class="status" id="dlhint"></div>
  </div>
</section>
<section class="panel">
  <div class="block panelbody">
    <label>BACKGROUND</label>
    <div class="swatches" id="bgrow"></div>
    <div id="zones"></div>
  </div>
</section>
</main>
<footer>Layer artwork derived from the Pixel Pepe and Bobo creators.</footer>

const $=s=>document.getElementById(s);
const cv=$('cv'),ctx=cv.getContext('2d');
const SLOTS=L.zorder;
function decode(p){const out=[];for(let i=0;i<p.length;i+=10)out.push([parseInt(p.substr(i,2),16),parseInt(p.substr(i+2,2),16),'#'+p.substr(i+4,6)]);return out}
const BOBO=decode(L.bobo.p);
const SLOTDATA={};SLOTS.forEach(s=>SLOTDATA[s]=L.slots[s].map((e,i)=>({id:i,name:e.name,pix:decode(e.p)})));
// backgrounds may be solid (hex) or gradient (pix)
const BGS=L.bgs.map(b=>({name:b.name,hex:b.hex,pix:b.p?decode(b.p):null,g:b.g||null}));
const sel={bgIdx:0,picks:{}};
const off=document.createElement('canvas');off.width=24;off.height=24;const octx=off.getContext('2d');
function paint(g,pix){for(const [y,x,c] of pix){g.fillStyle=c;g.fillRect(x,y,1,1)}}
function paintBg(g,b){
  if(b.pix){paint(g,b.pix)}
  else{g.fillStyle='#'+b.hex;g.fillRect(0,0,24,24)}
}
function compose(g,s){
  paintBg(g,BGS[s.bgIdx]);
  paint(g,BOBO);
  for(const z of SLOTS){const id=s.picks[z];if(id!=null)paint(g,SLOTDATA[z][id].pix)}
}
function memeText(txt,y,align){
  if(!txt)return;
  const size=+$('size').value;
  ctx.font=`900 ${size}px Impact,'Arial Black',sans-serif`;
  ctx.textAlign='center';ctx.lineJoin='round';ctx.fillStyle='#fff';ctx.strokeStyle='#000';ctx.lineWidth=Math.max(6,size/9);
  const maxW=cv.width-60,words=txt.toUpperCase().split(' '),lines=[];let line='';
  for(const w of words){const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w}else line=t}
  lines.push(line);
  const lh=size*1.08;
  lines.forEach((l,i)=>{const yy=align==='top'?y+i*lh:y-(lines.length-1-i)*lh;ctx.strokeText(l,cv.width/2,yy);ctx.fillText(l,cv.width/2,yy)});
}
function draw(){
  ctx.imageSmoothingEnabled=false;ctx.clearRect(0,0,cv.width,cv.height);
  compose(octx,sel);ctx.drawImage(off,0,0,cv.width,cv.height);
  memeText($('top').value,+$('size').value+28,'top');
  memeText($('bot').value,cv.height-46,'bottom');
  if($('wm').checked){
    ctx.font='700 34px "Press Start 2P",monospace';ctx.textAlign='right';ctx.lineJoin='round';
    ctx.lineWidth=8;ctx.strokeStyle='rgba(0,0,0,.85)';ctx.fillStyle='#fee1bf';
    ctx.strokeText('$BOBO',cv.width-22,cv.height-22);ctx.fillText('$BOBO',cv.width-22,cv.height-22);
  }
}
function traitLine(){
  const bits=[`<b>BG</b> ${BGS[sel.bgIdx].name}`];
  for(const z of SLOTS){const id=sel.picks[z];if(id!=null)bits.push(`<b>${z}</b> ${SLOTDATA[z][id].name}`)}
  $('traitline').innerHTML=bits.join(' · ');
}
function bgStyle(b){
  if(b.g)return `linear-gradient(180deg, ${b.g.tl} 0%, ${b.g.bl} 100%)`;
  if(b.pix){
    // fallback: average color
    let r=0,g=0,bl=0;for(const [,,c] of b.pix){r+=(c>>16)&255;g+=(c>>8)&255;bl+=c&255}
    const n=b.pix.length;return `rgb(${r/n|0},${g/n|0},${bl/n|0})`;
  }
  return '#'+b.hex;
}
const thumbs=[];
function buildUI(){
  BGS.forEach((bg,i)=>{
    const b=document.createElement('button');b.className='sw';b.style.background=bgStyle(bg);
    b.title=bg.name;
    b.innerHTML=`<span class="lbl">${bg.name}</span>`;
    b.setAttribute('aria-pressed',i===sel.bgIdx);
    b.onclick=()=>{sel.bgIdx=i;[...$('bgrow').children].forEach((x,j)=>x.setAttribute('aria-pressed',j===sel.bgIdx));redraw()};
    $('bgrow').appendChild(b);
  });
  for(const z of SLOTS){
    const items=SLOTDATA[z];
    const zone=document.createElement('div');zone.className='zone';
    zone.innerHTML=`<div class="zonehead"><span class="zlabel">${z.toUpperCase()}</span><span class="zcount">${items.length} traits</span></div>`;
    const grid=document.createElement('div');grid.className='tgrid';
    const none=document.createElement('button');none.className='thumb none-th';none.innerHTML='<span>none</span>';
    none.onclick=()=>{delete sel.picks[z];redraw()};
    grid.appendChild(none);
    items.forEach(it=>{
      const b=document.createElement('button');b.className='thumb';b.dataset.z=z;b.dataset.tid=it.id;
      b.title=it.name;
      const cnv=document.createElement('canvas');cnv.width=24;cnv.height=24;b.appendChild(cnv);
      const nm=document.createElement('span');nm.className='nm';nm.textContent=it.name;b.appendChild(nm);
      thumbs.push({z,it,cnv});
      b.onclick=()=>{
        if(sel.picks[z]===it.id)delete sel.picks[z];else sel.picks[z]=it.id;
        redraw();
      };
      grid.appendChild(b);
    });
    zone.appendChild(grid);$('zones').appendChild(zone);
  }
  drawThumbs();
}
function drawThumbs(){
  for(const {z,it,cnv} of thumbs){
    const g=cnv.getContext('2d');g.imageSmoothingEnabled=false;
    paintBg(g,BGS[sel.bgIdx]);paint(g,BOBO);paint(g,it.pix);
  }
}
function refresh(){
  document.querySelectorAll('.thumb[data-tid]').forEach(b=>{
    b.setAttribute('aria-pressed',sel.picks[b.dataset.z]===+b.dataset.tid);
  });
}
function redraw(){drawThumbs();refresh();traitLine();draw()}
const REQUIRED=new Set(['Mouth','Eyes']);
function rollAll(){
  sel.bgIdx=(Math.random()*BGS.length)|0;
  sel.picks={};
  for(const z of SLOTS){
    if(REQUIRED.has(z)||Math.random()<0.85){
      sel.picks[z]=(Math.random()*SLOTDATA[z].length)|0;
    }
  }
  [...$('bgrow').children].forEach((x,j)=>x.setAttribute('aria-pressed',j===sel.bgIdx));
  redraw();
}
$('mint').onclick=rollAll;
$('clear').onclick=()=>{sel.picks={};redraw()};
['top','bot','wm'].forEach(i=>$(i).addEventListener('input',draw));
$('size').addEventListener('input',draw);
$('dl').onclick=()=>{const a=document.createElement('a');a.download='bobo.png';a.href=cv.toDataURL('image/png');a.click();$('dlhint').textContent='Saved.'};
$('copy').onclick=async()=>{try{const blob=await new Promise(r=>cv.toBlob(r,'image/png'));await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);$('dlhint').textContent='Copied.'}catch(e){$('dlhint').textContent='Copy unavailable — use SAVE PNG.'}};
buildUI();redraw();
</script>
